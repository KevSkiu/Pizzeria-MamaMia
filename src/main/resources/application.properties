spring.application.name=mamamia

# --- Datasource ---
# En local usa los valores por defecto (localhost/root/root).
# En Railway, lee las variables MYSQL_URL, MYSQL_USER y MYSQL_PASSWORD
# que configuraste en el servicio backend (Paso 3.1).
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/mamamia_db}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Puerto del servidor ---
# CRÍTICO para Railway: la plataforma inyecta su propio puerto en la
# variable de entorno PORT. Si no se lee esta variable, Railway no
# podrá enrutar el tráfico hacia el contenedor y el deploy fallará
# en el healthcheck. En local, al no existir PORT, cae a 8080.
server.port=${PORT:8080}